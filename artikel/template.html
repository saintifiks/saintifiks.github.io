<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judul Artikel - Saintifiks</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#111111">
    
    <link rel="stylesheet" href="../css/saintifiks.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    
    <script src="../js/api.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <script src="../js/saintifiks-charts.js" defer></script>
</head>
<body>
    <header style="border-bottom: 2px solid var(--base-black); padding: var(--spacing-md) 0; margin-bottom: var(--spacing-lg);">
        <div style="max-width: var(--content-width); margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 var(--spacing-md);">
            <div style="font-family: var(--font-primary); font-weight: 700; font-size: 1.5rem; letter-spacing: -1px;">
                <a href="../index.html" style="color: var(--base-black); text-decoration: none;">SAINTIFIKS</a>
            </div>
            <div id="user-profile-container" style="display: flex; align-items: center;"></div>
        </div>
    </header>

    <main style="max-width: var(--content-width); margin: 0 auto; padding: 0 var(--spacing-md);">
        
        <span class="kicker">Kategori Makroekonomi</span>
        <h1>Judul Analisis Struktural Data Anda</h1>
        <p>Prosa analisis mendalam, data-ink ratio tinggi, dan kliping data kuantitatif diletakkan di bagian ini.</p>
        
        <div style="margin: var(--spacing-lg) 0;">
            <canvas id="analyticsChart"></canvas>
        </div>
        <div id="reaction-container" style="margin: var(--spacing-lg) auto var(--spacing-md) auto; text-align: center; border-top: 1px solid var(--border-color); padding-top: var(--spacing-md); max-width: 300px;">
            <button id="btn-like-icon" style="background: transparent; border: none; padding: 10px; cursor: pointer; outline: none; transition: transform 0.2s ease;">
                <svg id="svg-heart" width="28" height="28" viewBox="0 0 24 24" style="transition: all 0.3s ease;">
                    <path id="path-heart" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" 
                          stroke="var(--base-black)" fill="none" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" />
                </svg>
            </button>
            <div id="like-count-display" style="font-family: var(--font-secondary); font-size: 0.85rem; color: #777; margin-top: -5px;">...</div>
        </div>


        <div id="comments-section" style="margin-top: var(--spacing-lg); border-top: 1px solid var(--border-color); padding-top: var(--spacing-md);">
            <h3 style="font-family: var(--font-tertiary); text-transform: uppercase; font-size: 1rem;">Diskusi Publik</h3>
            </div>
        </main>

    <style>
        #btn-like-icon:hover {
            transform: scale(1.08);
        }
        #btn-like-icon:hover #path-heart {
            stroke-width: 2.5;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startTime = Date.now();
            const articleId = "ART-001"; // Wajib disesuaikan manual berdasarkan ID Artikel di basis data

            // 1. SISTEM TELEMETRI DURASI SESI (KEEPALIVE BACKGROUND TRANSMISSION)
            window.addEventListener('beforeunload', () => {
                const durationSeconds = Math.floor((Date.now() - startTime) / 1000);
                
                if (durationSeconds >= 5) {
                    const token = localStorage.getItem('saintifiks_token');
                    let identifier = 'anonymous';
                    
                    if (token) {
                        try {
                            const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                            identifier = JSON.parse(atob(base64)).email;
                        } catch (e) {}
                    }

                    const payload = {
                        action: 'track_session',
                        data: {
                            identifier: identifier,
                            article_id: articleId,
                            duration_seconds: durationSeconds
                        }
                    };

                    fetch("https://script.google.com/macros/s/AKfycbwqhhX9VYDptBG78FaTy_hMtB87qOyZRuE56EkLS7jHPLo4lcnc6XffEjb6VWYgOHQ9/exec", {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload),
                        keepalive: true
                    }).catch(console.error);
                }
            });

            // 2. LOGIKA INTERAKSI HEARTS REACTION & OPTIMISTIC UPDATE
            const btnLike = document.getElementById('btn-like-icon');
            const pathHeart = document.getElementById('path-heart');
            const countDisplay = document.getElementById('like-count-display');

            function setLikedState() {
                pathHeart.setAttribute('fill', 'var(--base-black)');
                pathHeart.setAttribute('stroke', 'var(--base-black)');
                btnLike.disabled = true;
                btnLike.style.cursor = 'default';
                btnLike.style.transform = 'none';
                btnLike.querySelector('svg').style.opacity = '0.9';
            }

            // Inisialisasi awal status secara senyap (Silent Load)
            const token = localStorage.getItem('saintifiks_token');
            let userEmail = '';
            if (token) {
                try {
                    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                    userEmail = JSON.parse(atob(base64)).email;
                } catch(e) {}
            }

            if (typeof api !== 'undefined') {
                api.get('get_article_status', { article_id: articleId, email: userEmail })
                   .then(res => {
                       if(res.status === 'success') {
                           countDisplay.innerText = `${res.data.like_count} Reaksi`;
                           if(res.data.user_has_liked) setLikedState();
                       }
                   })
                   .catch(() => countDisplay.innerText = "0 Reaksi");
            }

            // Pemicu Klik Berbasis Manipulasi State Instan (Optimistic UI)
            btnLike.addEventListener('click', () => {
                const currentToken = localStorage.getItem('saintifiks_token');
                
                if (!currentToken) {
                    pathHeart.setAttribute('stroke', 'var(--accent-red)');
                    pathHeart.setAttribute('stroke-width', '3');
                    
                    setTimeout(() => {
                        pathHeart.setAttribute('stroke', 'var(--base-black)');
                        pathHeart.setAttribute('stroke-width', '2');
                        if (typeof google !== 'undefined' && google.accounts.id) {
                            google.accounts.id.prompt();
                        }
                    }, 1000);
                    return;
                }

                // Kunci UI seketika sebelum peladen memproses data
                setLikedState();
                let currentCount = parseInt(countDisplay.innerText) || 0;
                countDisplay.innerText = `${currentCount + 1} Reaksi`;

                // Kirim data ke Google Apps Script di latar belakang jaringan
                if (typeof api !== 'undefined') {
                    api.post('like_article', { token: currentToken, article_id: articleId })
                       .then(res => {
                           if (res.status !== 'success') {
                               console.warn("Sinkronisasi internal pangkalan data gagal.");
                           }
                       }).catch(err => {
                           console.error("Gagal menjangkau API peladen GAS.", err);
                       });
                }
            });
        });
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('Service Worker terdaftar pada cakupan:', registration.scope))
                    .catch(error => console.error('Kegagalan registrasi Service Worker:', error));
            });
        }
    </script>
</body>
</html>
